server:
  port: 8083

spring:
  application:
    name: DIGITAL-TWIN-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/transitops
    username: postgres
    password: root@123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka